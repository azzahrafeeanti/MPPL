<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>event saya</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Sriracha&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/eventSaya.css" />
  </head>
  <body>
    <div class="container">
      <div class="tab-header">
        <button class="tab-btn active" data-tab="data-pembeli">
          DATA PEMBELI
        </button>
        <button class="tab-btn" data-tab="laporan-penjualan">
          LAPORAN PENJUALAN
        </button>
      </div>

      <!-- DATA PEMBELI -->
      <div id="data-pembeli" class="tab-content active">
        <select id="filter-pembeli" class="dropdown">
          <option>Semua Data Pembeli</option>
          <option>Data Pembeli Tiket Berbayar</option>
          <option>Data Pembeli Tiket Sesukamu</option>
          <option>Data Pembeli Tiket Gratis</option>
        </select>
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Name</th>
              <th>Email</th>
              <th>Tgl Pembelian</th>
              <th>Jenis Kelamin</th>
              <th>NIK</th>
              <th>Media Sosial</th>
              <th>Nama Tiket</th>
              <th>Status Tiket</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- LAPORAN PENJUALAN -->
      <div id="laporan-penjualan" class="tab-content">
        <select id="filter-penjualan" class="dropdown">
          <option>Semua Laporan Penjualan</option>
          <option>Laporan Penjualan Tiket Berbayar</option>
          <option>Laporan Penjualan Tiket Suka Rela</option>
          <option>Laporan Penjualan Tiket Gratis</option>
        </select>
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Status Tiket</th>
              <th>Nama Tiket</th>
              <th>Harga Tiket</th>
              <th>Tiket Terjual</th>
              <th>Total Penjualan</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script>
      const tabButtons = document.querySelectorAll(".tab-btn");
      const tabContents = document.querySelectorAll(".tab-content");

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          tabButtons.forEach((btn) => btn.classList.remove("active"));
          tabContents.forEach((content) => content.classList.remove("active"));

          button.classList.add("active");
          document.getElementById(button.dataset.tab).classList.add("active");
        });
      });
    </script>
  </body>
</html>
